<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code WebUI</title>
  <link rel="stylesheet" href="/xterm.css">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Source+Code+Pro:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Inconsolata:wght@400;500&display=swap">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Sessions</span>
      <button id="sidebar-close" class="icon-btn" title="Close sidebar">✕</button>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto;display:flex;flex-direction:column">
      <div style="display:flex;gap:4px;padding:4px 6px;align-items:center">
        <input type="text" id="session-filter" class="filter-input" style="margin:0;flex:1" placeholder="Filter...">
        <button id="live-filter" class="icon-btn" title="Filter by status" style="font-size:11px;width:auto;padding:0 6px">●</button>
      </div>
      <div id="all-sessions-list" class="session-items" style="flex:1;overflow-y:auto">
        <div class="empty-hint">Loading...</div>
      </div>
    </div>
  </aside>

  <!-- Main Layout -->
  <div id="main-wrapper">
    <!-- Top Toolbar -->
    <header id="toolbar">
      <div class="toolbar-left">
        <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar">☰</button>
        <span class="toolbar-title">Claude Code WebUI</span>
      </div>
      <div class="toolbar-center"></div>
      <div class="toolbar-right">
        <button id="btn-global-settings" class="icon-btn" title="Global settings" style="font-size:14px;width:28px;height:28px">⚙</button>
        <button id="btn-layouts" class="toolbar-action" title="Saved layouts">💾 Layouts</button>
        <button id="btn-new-session" class="toolbar-action">+ New Session</button>
        <button id="btn-file-explorer" class="toolbar-action">📁 Files</button>
        <button id="btn-browser" class="toolbar-action">🌐 Browser</button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main id="workspace">
      <div id="snap-indicator"></div>
      <div id="grid-overlay"></div>
      <div id="welcome">
        <div class="welcome-content">
          <h1>Claude Code WebUI</h1>
          <p>Multi-session terminal manager with tiling window support</p>
          <div class="welcome-actions">
            <button class="welcome-btn" id="welcome-new">Create New Session</button>
            <button class="welcome-btn welcome-btn-secondary" id="welcome-files">Open File Explorer</button>
          </div>
          <div class="welcome-shortcuts">
            <p>Drag windows to edges to snap | Use toolbar for layout presets | Toggle sidebar for sessions</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Taskbar -->
    <footer id="taskbar">
      <div id="taskbar-items"></div>
      <div id="taskbar-usage" class="taskbar-usage" title="Click for usage details"></div>
      <div id="taskbar-status"><span id="active-count">0 active</span></div>
    </footer>
    <!-- Usage popup -->
    <div id="usage-popup" class="usage-popup hidden"></div>
  </div>

  <!-- Dialogs -->
  <div id="dialog-overlay" class="dialog-overlay hidden">
    <!-- New Session Dialog -->
    <div id="dialog-new-session" class="dialog hidden">
      <div class="dialog-header"><h3>New Claude Code Session</h3><button class="dialog-close">✕</button></div>
      <div class="dialog-body">
        <label>Working Directory
          <div class="autocomplete-wrapper">
            <input type="text" id="input-cwd" placeholder="/home/user/project" autocomplete="off">
            <div id="cwd-suggestions" class="autocomplete-dropdown hidden"></div>
          </div>
        </label>
        <label>Session Name<input type="text" id="input-session-name" placeholder="My Project"></label>
        <label>Model<select id="input-model"><option value="">Default</option><option value="opus">Opus</option><option value="sonnet">Sonnet</option><option value="haiku">Haiku</option></select></label>
        <label>Permission Mode<select id="input-permission"><option value="">Default</option><option value="auto">Auto</option><option value="bypassPermissions">Bypass</option><option value="plan">Plan</option><option value="acceptEdits">Accept Edits</option></select></label>
        <label>Additional Arguments<input type="text" id="input-extra-args" placeholder="--verbose"></label>
      </div>
      <div class="dialog-footer"><button class="btn-cancel">Cancel</button><button class="btn-create">Create Session</button></div>
    </div>

    <!-- Grid Config Dialog (removed) -->

    <!-- Layout Manager Dialog -->
    <div id="dialog-layouts" class="dialog hidden">
      <div class="dialog-header"><h3>Saved Layouts</h3><button class="dialog-close">✕</button></div>
      <div class="dialog-body">
        <div class="layout-save-row">
          <input type="text" id="layout-save-name" placeholder="Layout name...">
          <button class="btn-create" id="btn-layout-save" style="white-space:nowrap">Save Current</button>
        </div>
        <div id="saved-layouts-list" class="session-items" style="margin-top:8px"></div>
      </div>
      <div class="dialog-footer"><button class="btn-cancel">Cancel</button></div>
    </div>
  </div>

  <script src="/bundle.js"></script>
</body>
</html>
